<div class="page">
    <app-header></app-header>
    <div class="home-content">
        <h1>Select Category</h1>
        <div class="category-grid">
            @for(category of categories; track category.id){
                <div
                    class="category-card"
                    (click)="selectCategory(category)"
                >

                    <h2>
                        {{category.name}}
                    </h2>

                </div>
            }
        </div>
    </div>
</div>
