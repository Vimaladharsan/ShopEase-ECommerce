<header class="header">
        <div class="left-section">
            <div
                class="home-icon"
                routerLink="/home"
            >
                🏠
            </div>
            <div class="logo">
                ShopEase
            </div>
        </div>
        <div class="right-section">
            <div
                class="cart-section"
                (click)="goToCheckout()"
            >
                🛒 {{cartService.getCartCount()}}
            </div>
            <div class="profile-section" routerLink="/profile">
                <div class="profile-image">
                    👤
                </div>
                <span>
                    {{username}}
                </span>
            </div>
        </div>
    </header>
